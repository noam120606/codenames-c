name: Auto version (patch)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure git tags present
        run: |
          git fetch --tags || true

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Compute next patch
        id: next
        run: |
          TAG=${{ steps.get_tag.outputs.latest_tag }}
          V=${TAG#v}
          IFS='.' read -r MA MI PA <<< "$V"
          if [ -z "$MA" ] || [ -z "$MI" ] || [ -z "$PA" ]; then
            MA=0; MI=0; PA=0
          fi
          PA=$((PA+1))
          NEW_TAG="v${MA}.${MI}.${PA}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Write VERSION file and commit
        env:
          NEW_TAG: ${{ steps.next.outputs.new_tag }}
        run: |
          echo "$NEW_TAG" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): bump version to $NEW_TAG" || echo "no changes to commit"
          git push origin HEAD:main

      - name: Create tag and push
        env:
          NEW_TAG: ${{ steps.next.outputs.new_tag }}
        run: |
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.next.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
